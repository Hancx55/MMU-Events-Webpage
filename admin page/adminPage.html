<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MMU Events</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="adminPage.css">
    <script src="JavaScript.js" defer></script>
    <script src="admin-logic.js" defer></script>
</head>
<body>
    <div id="navbar"></div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="admin-view-module">
                <h3>Navigation</h3>
                <button type="button" class="nav-btn" onclick="location.href='homepage.html'">Home</button>
                <button type="button" class="nav-btn" onclick="location.href='forum page/forum.html'">Forum</button>
                <hr>
                <p style="font-size: 0.8em; margin-top: 10px;">Logged in as: <strong>Admin_User</strong></p>
            </div>
        </aside>

        <main class="main-content">
            <h1 class="form-title">Create New Event</h1>
            <form id="eventCreationForm">
                <div class="form-group">
                    <label for="eventName">Event Name:</label>
                    <input type="text" id="eventName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="location">Location:</label>
                    <input type="text" id="location" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="timeDate">Time & Date:</label>
                    <input type="datetime-local" id="timeDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="description">Short Description:</label>
                    <input type="text" id="shortDesc" class="form-control" placeholder="Brief summary for list view" required>
                </div>
                <div class="form-group">
                    <label for="fullDesc">Full Description:</label>
                    <textarea id="fullDesc" class="form-control" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Post Event to Site</button>
            </form>
        </main>
    </div>

    <footer id="footer"></footer>
</body>
</html>
