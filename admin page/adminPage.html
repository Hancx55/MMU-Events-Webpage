<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | MMU Events</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="adminPage.css">
    <script src="JavaScript.js" defer></script>
    <script src="adminPage.js" defer></script>
</head>
<body>
    <div id="navbar"></div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <section class="admin-view-module">
                <h3 class="sidebar-title">Posted Events</h3>
                <p class="sidebar-subtitle">Current session uploads:</p>
                <div id="adminEventList">
                    <p style="font-size: 12px; color: #888;">No events posted yet.</p>
                </div>
            </section>
        </aside>

        <main class="main-content">
            <h1 class="form-title">Create New Event</h1>
            
            <form id="eventCreationForm">
                <div class="form-group">
                    <label for="eventName">Event Name:</label>
                    <input type="text" id="eventName" class="form-control" required placeholder="e.g. Careers Fair">
                </div>

                <div class="form-group">
                    <label for="location">Location:</label>
                    <input type="text" id="location" class="form-control" required placeholder="e.g. Business School">
                </div>

                <div class="form-group">
                    <label for="timeDate">Date & Time:</label>
                    <input type="datetime-local" id="timeDate" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="availableSpots">Spots:</label>
                    <input type="number" id="availableSpots" class="form-control" min="1" required>
                </div>

                <div class="form-group">
                    <label for="shortDescription">Short Summary:</label>
                    <input type="text" id="shortDescription" class="form-control" required placeholder="Brief catchphrase for the list view">
                </div>

                <div class="form-group align-top">
                    <label for="fullDescription">Full Details:</label>
                    <textarea id="fullDescription" class="form-control" required placeholder="Detailed information for the popup..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Post Event to Site</button>
            </form>
        </main>
    </div>

    <footer id="footer"></footer>
</body>
</html>
