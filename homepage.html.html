<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page - Events</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: #f5f5f5;
}

/* Header Section */
header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 20px 40px;
background-color: white;
border-bottom: 1px solid #e0e0e0;
}

.logo {
min-width: 120px;
display: flex;
align-items: center;
justify-content: center;
}
.logo img {
width: 80px;
height: 80px;
}

nav {
flex: 1;
display: flex;
justify-content: center;
}

nav a {
margin: 0 25px;
text-decoration: none;
color: #555;
font-size: 14px;
transition: color 0.3s;
}

nav a:hover {
color: #000;
}

.header-right {
display: flex;
align-items: center;
gap: 20px;
}

.search-bar {
padding: 8px 15px;
border: 1px solid #ddd;
border-radius: 4px;
width: 180px;
font-size: 14px;
}

.info-icon {
width: 45px;
height: 45px;
background-color: #333;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
color: white;
font-weight: bold;
cursor: pointer;
transition: background-color 0.3s;
}

.info-icon:hover {
background-color: #555;
}

/* Main Description Section */
.main-description {
background-color: white;
padding: 100px 40px;
text-align: center;
margin: 20px;
border: 1px solid #ddd;
min-height: 300px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
}

.main-description h1 {
font-size: 32px;
color: #333;
margin-bottom: 20px;
}

.main-description p {
font-size: 16px;
color: #666;
max-width: 600px;
}

/* Events Section */
.events-section {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin: 20px;
margin-bottom: 40px;
}

.event-card {
background-color: #424242;
padding: 60px 20px;
border-radius: 8px;
text-align: center;
color: white;
cursor: pointer;
transition: background-color 0.3s;
min-height: 150px;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
}

.event-card:hover {
background-color: #555;
}

/* Top Recommended Section */
.recommended-section {
background-color: white;
padding: 100px 40px;
text-align: center;
margin: 20px;
border: 1px solid #ddd;
min-height: 300px;
display: flex;
align-items: center;
justify-content: center;
}

.recommended-section h2 {
font-size: 24px;
color: #333;
}

/* Footer Section */
footer {
background-color: #f5f5f5;
padding: 80px 40px;
text-align: center;
border-top: 1px solid #ddd;
margin-top: 20px;
margin: 20px;
}

footer h3 {
font-size: 16px;
color: #666;
margin-bottom: 20px;
}

footer a {
display: inline-block;
margin: 0 15px;
text-decoration: none;
color: #0066cc;
transition: color 0.3s;
}

footer a:hover {
color: #0052a3;
}

.contact-button {
background-color: #333;
color: white !important;
padding: 12px 30px;
border-radius: 4px;
margin-top: 20px;
font-weight: bold;
transition: background-color 0.3s;
}

.contact-button:hover {
background-color: #555 !important;
color: white !important;
}

.mmu-button {
background-color: #333;
color: white !important;
padding: 12px 30px;
border-radius: 4px;
margin-top: 20px;
font-weight: bold;
transition: background-color 0.3s;
display: inline-block;
}

.mmu-button:hover {
background-color: #555 !important;
color: white !important;
}

/* Responsive Design */
@media (max-width: 1024px) {
.events-section {
grid-template-columns: repeat(2, 1fr);
}
}

@media (max-width: 768px) {
header {
flex-direction: column;
gap: 15px;
padding: 15px;
}

nav {
order: 3;
width: 100%;
justify-content: center;
flex-wrap: wrap;
}

nav a {
margin: 0 10px;
font-size: 12px;
}

.header-right {
width: 100%;
justify-content: space-between;
}

.events-section {
grid-template-columns: 1fr;
}

.search-bar {
width: 100%;
}

.main-description,
.recommended-section,
footer {
padding: 40px 20px;
margin: 10px;
}
}
</style>
</head>
<body>
<!-- Header -->
<header>
<div class="logo">
<img src="logo.png" alt="Logo">
</div>
<nav>
<a href="index.html">Home</a>
<a href="#events">Events</a>
<a href="https://www.mmu.ac.uk/about-us/contact">Contact</a>
<a href="#login">Login</a>
</nav>
<div class="header-right">
<input type="text" class="search-bar" placeholder="Search...">
<div class="info-icon">i</div>
</div>
</header>

<!-- Main Description -->
<section class="main-description">
<h1>Welcome to Our Events Platform</h1>
<p>Discover amazing university events happening near you. make sure to register to keep track of different events that are taking place at MMU; browse and explore for the ones youl love.</p>
</section>

<!-- Events Grid -->
<section class="events-section">
<div class="event-card">event 1</div>
<div class="event-card">event 2</div>
<div class="event-card">event 3</div>
</section>

<!-- Top Recommended Events -->
<section class="recommended-section">
<h2>top recommended events</h2>
</section>

<!-- Footer -->
<footer>
<a href="https://www.mmu.ac.uk" class="mmu-button">MMU</a>
</footer>
</body>
</html>
