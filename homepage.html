<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page - Events</title>
<script src="JavaScript.js" defer></script>
<link rel="stylesheet" href="styles.css">
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: #f5f5f5;
}

/* Main Description Section */
.main-description {
background-color: white;
padding: 100px 40px;
text-align: center;
margin: 20px;
border: 1px solid #ddd;
min-height: 300px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
}

.main-description h1 {
font-size: 32px;
color: #333;
margin-bottom: 20px;
}

.main-description p {
font-size: 16px;
color: #666;
max-width: 600px;
}

/* Events Section */
.events-section {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin: 20px;
margin-bottom: 40px;
}

.event-card {
background-color: #0094d8;
padding: 60px 20px;
border-radius: 8px;
text-align: center;
color: white;
cursor: pointer;
transition: background-color 0.3s;
min-height: 150px;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
}

.event-card:hover {
background-color: #555;
}

/* Top Recommended Section */
.recommended-section {
background-color: white;
padding: 100px 40px;
text-align: center;
margin: 20px;
border: 1px solid #ddd;
min-height: 300px;
display: flex;
align-items: center;
justify-content: center;
}

.recommended-section h2 {
font-size: 24px;
color: #333;
}

.contact-button {
background-color: #333;
color: white !important;
padding: 12px 30px;
border-radius: 4px;
margin-top: 20px;
font-weight: bold;
transition: background-color 0.3s;
}

.contact-button:hover {
background-color: #555 !important;
color: white !important;
}

.mmu-button {
background-color: #333;
color: white !important;
padding: 12px 30px;
border-radius: 4px;
margin-top: 20px;
font-weight: bold;
transition: background-color 0.3s;
display: inline-block;
}

.mmu-button:hover {
background-color: #555 !important;
color: white !important;
}

/* Responsive Design */
@media (max-width: 1024px) {
.events-section {
grid-template-columns: repeat(2, 1fr);
}
}

@media (max-width: 768px) {
.header-right {
width: 100%;
justify-content: space-between;
}

.events-section {
grid-template-columns: 1fr;
}
}
</style>
</head>
<body>
<!-- Header -->
 <div id="navbar"></div>

<!-- Main Description -->
<section class="main-description">
<h1>Welcome to Our Events Platform</h1>
<p>Discover amazing university events happening near you. make sure to register to keep track of different events that are taking place at MMU; browse and explore for the ones youl love.</p>
</section>

<!-- Events Grid -->
<section class="events-section">
<div class="event-card">event 1</div>
<div class="event-card">event 2</div>
<div class="event-card">event 3</div>
</section>

<!-- Top Recommended Events -->
<section class="recommended-section">
<h2>top recommended events</h2>
</section>

<!-- Footer -->
<footer id="footer">
</footer>
</body>

</html>
