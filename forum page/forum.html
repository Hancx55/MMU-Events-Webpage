<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Forum | Manchester Metropolitan University</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mmu-navy: #001a33; 
            --mmu-bright-blue: #00a1de; 
            --bg-grey: #d1d5db;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--bg-grey);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background-color: var(--mmu-navy);
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--mmu-bright-blue);
            padding: 0 5%;
            box-sizing: border-box;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* LOGO STYLING */
        .logo-container img {
            height: 45px;
            width: auto;
            display: block;
            /* This turns the navy logo white so it's visible on the header */
            filter: brightness(0) invert(1);
        }

        /* HOME PAGE BUTTON */
        .home-btn {
            background-color: var(--mmu-bright-blue);
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .home-btn:hover {
            background-color: white;
            color: var(--mmu-navy);
        }

        /* MAIN CONTENT AREA */
        .content {
            flex: 1; 
            padding: 40px 0;
        }

        .wrapper {
            max-width: 700px;
            background: #e5e7eb;
            margin: 0 auto;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: var(--mmu-navy);
            font-size: 26px;
            margin-bottom: 30px;
        }

        .input-box {
            width: 100%;
            margin-bottom: 15px;
        }

        .input-box input, .input-box textarea {
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            box-sizing: border-box;
            font-size: 14px;
            background: white;
            font-family: inherit;
        }

        .input-box textarea {
            height: 120px;
            resize: none;
        }

        .btn-post {
            width: 100%;
            height: 55px;
            background: var(--mmu-bright-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-post:hover {
            background: #0088bb;
        }

        /* FORUM FEED CARDS */
        .forum-feed {
            margin-top: 40px;
            text-align: left;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }

        .post-card {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 6px solid var(--mmu-navy);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* FOOTER */
        footer {
            background-color: var(--mmu-navy);
            color: #ccc;
            padding: 25px 5%;
            text-align: center;
            font-size: 12px;
            border-top: 4px solid var(--mmu-bright-blue);
        }

        footer b { color: white; }

    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="images/mmu-logo.svg" alt="MMU Logo">
    </div>
    <div class="nav-links">
        <a href="index.html" class="home-btn">Home Page</a>
    </div>
</header>

<div class="content">
    <div class="wrapper">
        <h1>Event Forum</h1>
        
        <div class="input-box">
            <input type="text" id="topic" placeholder="Discussion Topic...">
        </div>

        <div class="input-box">
            <textarea id="details" placeholder="Details about the event or question..."></textarea>
        </div>

        <button type="button" class="btn-post" id="postBtn">Post to Forum</button>

        <div class="forum-feed" id="forumFeed">
            <div class="post-card">
                <h3 style="margin:0; color: var(--mmu-navy);">Welcome to the Student Forum</h3>
                <p style="margin:10px 0; color:#555; font-size:14px;">Use this space to discuss upcoming campus events and society meetups!</p>
                <small style="color:#999;">Posted by: <b>System_Admin</b></small>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2024 <b>Manchester Metropolitan University</b>. Student Group Project.</p>
</footer>

<script>
    // Logic to make the forum interactive
    const postBtn = document.getElementById('postBtn');
    const forumFeed = document.getElementById('forumFeed');
    const topicInput = document.getElementById('topic');
    const detailsInput = document.getElementById('details');

    postBtn.onclick = function() {
        const t = topicInput.value.trim();
        const d = detailsInput.value.trim();

        if (t && d) {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <h3 style="margin:0; color: var(--mmu-navy);">${t}</h3>
                <p style="margin:10px 0; color:#555; font-size:14px;">${d}</p>
                <small style="color:#999;">Posted by: <b>Student_User</b> • Just Now</small>
            `;
            forumFeed.prepend(card);
            topicInput.value = '';
            detailsInput.value = '';
        } else {
            alert("Please fill in both fields before posting.");
        }
    };
</script>

</body>
</html>
